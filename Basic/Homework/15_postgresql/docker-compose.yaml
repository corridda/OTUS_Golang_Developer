services:
  postgres:
    image: postgres:16-alpine
    container_name: hw15-postgres
    environment:
      POSTGRES_USER: otus_user
      POSTGRES_PASSWORD: otus_password
      POSTGRES_DB: remindables
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U otus_user -d remindables"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
